services:
  redis:
    image: redis:7-alpine
    container_name: qma-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: qma-auth-service
    ports:
      - "${AUTH_PORT:-5001}:5001"
    environment:
      - ASPNETCORE_URLS=http://+:5001
      - ConnectionStrings__Redis=redis:6379
      - ConnectionStrings__DefaultConnection=${AUTH_DB_CONNECTION:-}
      - Jwt__Key=${JWT_KEY:-QuantityMeasurement_SuperSecretKey_UC17_AtLeast32Chars!}
      - Jwt__Issuer=${JWT_ISSUER:-QuantityMeasurementApi}
      - Jwt__Audience=${JWT_AUDIENCE:-QuantityMeasurementApi}
      - Jwt__ExpiryHours=${JWT_EXPIRY_HOURS:-24}
      - Google__ClientId=${GOOGLE_CLIENT_ID:-}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  qma-service:
    build:
      context: ./qma-service
      dockerfile: Dockerfile
    container_name: qma-qma-service
    ports:
      - "${QMA_PORT:-5002}:5002"
    environment:
      - ASPNETCORE_URLS=http://+:5002
      - ConnectionStrings__Redis=redis:6379
      - ConnectionStrings__DefaultConnection=${QMA_DB_CONNECTION:-}
      - Jwt__Key=${JWT_KEY:-QuantityMeasurement_SuperSecretKey_UC17_AtLeast32Chars!}
      - Jwt__Issuer=${JWT_ISSUER:-QuantityMeasurementApi}
      - Jwt__Audience=${JWT_AUDIENCE:-QuantityMeasurementApi}
      - Jwt__ExpiryHours=${JWT_EXPIRY_HOURS:-24}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: qma-api-gateway
    ports:
      - "${GATEWAY_PORT:-5000}:5000"
    environment:
      - ASPNETCORE_URLS=http://+:5000
      - Services__AuthService=http://auth-service:5001
      - Services__QmaService=http://qma-service:5002
    depends_on:
      auth-service:
        condition: service_healthy
      qma-service:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis-data:
